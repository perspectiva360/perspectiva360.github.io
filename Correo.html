<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/fuentes.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Formulario</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/Correo.css">
</head>
<body>
    <header>
         <a href="Sobre_mi.html" class="btn-volver">
            <i class="fas fa-arrow-left"></i> Volver
        </a>
    </header>
<div class="caja-formulario">
    <h2>Formulario para enviar un mensaje</h2>
    
	<form action="https://formsubmit.co/zharit.alvarez@gmail.com" method="post">
        <input type="hidden" name="_url" value="https://formsubmit.co/Gracias">
        <input type="hidden" name="_subject" value="Datos capturados desde el Formulario Web">
        <input type="hidden" name="_captcha" value="false"> 

        <div class="campo">
            <label>Nombre:</label>
            <input type="text" name="Remitente" required>
        </div>

        <div class="campo">
            <label>Correo electrónico:</label>
            <input type="email" name="correo" required>
        </div>

        <div class="campo">
            <label>Asunto:</label>
            <input type="text" name="Asunto_Mensaje" required>
        </div>

        <div class="campo">
            <label>Descripción del mensaje:</label>
            <textarea name="Contenido_Descripcion" required></textarea>
        </div>
        <button type="submit" class="boton-enviar">Enviar Correo Ahora</button>
    </form>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
